<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="Passwordgen.css">
</head>
<body>

<div class="container">

    <h1>Password Generator</h1>

    <input type="text" id="password" readonly>

    <div class="length-box">
        <label>Password Length:</label>
        <span id="length-value">12</span>
    </div>

    <input type="range" id="length" min="4" max="20" value="12">

    <div class="options">

        <label>
            <input type="checkbox" id="uppercase" checked>
            Uppercase
        </label>

        <label>
            <input type="checkbox" id="lowercase" checked>
            Lowercase
        </label>

        <label>
            <input type="checkbox" id="numbers" checked>
            Numbers
        </label>

        <label>
            <input type="checkbox" id="symbols" checked>
            Symbols
        </label>

    </div>

    <button id="generate">Generate Password</button>

    <button id="copy">Copy Password</button>

</div>

<script src="Passwordgen.js"></script>

</body>
</html>
